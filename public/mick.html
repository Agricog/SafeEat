<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Mick - SafeEat</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mick - SafeEat">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { width: 100%; max-width: 384px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
    .header { background: #16a34a; padding: 32px 24px 24px; text-align: center; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 40px; }
    .name { font-size: 24px; font-weight: 700; color: #fff; }
    .role { font-size: 14px; color: #bbf7d0; margin-top: 4px; }
    .details { padding: 20px 24px; }
    .detail-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: inherit; transition: background 0.15s; }
    .detail-link:hover { background: #f9fafb; }
    .icon-circle { width: 40px; height: 40px; border-radius: 50%; background: #f0fdf4; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-circle svg { width: 18px; height: 18px; color: #16a34a; stroke: #16a34a; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .detail-label { font-size: 12px; color: #9ca3af; }
    .detail-value { font-size: 14px; font-weight: 500; color: #111827; }
    .actions { padding: 0 24px 16px; }
    .sms-row { display: flex; gap: 8px; }
    .sms-input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e5e7eb; font-size: 14px; outline: none; font-family: inherit; }
    .sms-input:focus { border-color: #16a34a; box-shadow: 0 0 0 2px rgba(22,163,74,0.15); }
    .sms-input::placeholder { color: #9ca3af; }
    .sms-btn { padding: 12px 20px; border-radius: 12px; background: #16a34a; color: #fff; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: background 0.15s; white-space: nowrap; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .sms-btn:hover { background: #15803d; }
    .sms-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .qr-section { padding: 0 24px 24px; }
    .qr-box { background: #f9fafb; border-radius: 12px; padding: 16px; text-align: center; }
    .qr-label { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
    .qr-img { width: 144px; height: 144px; margin: 0 auto; }
    .qr-url { font-size: 12px; color: #9ca3af; margin-top: 8px; }
    .footer { text-align: center; padding: 16px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div style="width:100%;max-width:384px;">
    <div class="card">
      <div class="header">
        <div class="avatar">🍽️</div>
        <div class="name">Mick</div>
        <div class="role">Founder at SafeEat</div>
      </div>
      <div class="details">
        <a href="tel:07501439406" class="detail-link">
          <span class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          </span>
          <div>
            <div class="detail-label">Phone</div>
            <div class="detail-value">07501 439 406</div>
          </div>
        </a>
        <a href="mailto:hello@safeeat.co.uk" class="detail-link">
          <span class="icon-circle">
            <svg viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
          </span>
          <div>
            <div class="detail-label">Email</div>
            <div class="detail-value">hello@safeeat.co.uk</div>
          </div>
        </a>
        <a href="https://safeeat.co.uk" class="detail-link">
          <span class="icon-circle">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
          </span>
          <div>
            <div class="detail-label">Website</div>
            <div class="detail-value">safeeat.co.uk</div>
          </div>
        </a>
      </div>
      <div class="actions">
        <div class="sms-label">Send my details via text</div>
        <div class="sms-row">
          <input type="tel" id="phoneInput" class="sms-input" placeholder="Their phone number">
          <a id="smsLink" class="sms-btn" href="#" onclick="sendSms(event)">Send</a>
        </div>
        <div id="saveContact" style="display:none;margin-top:8px;">
          <button onclick="saveToContacts()" class="sms-btn" style="width:100%;">Save their number to your contacts</button>
        </div>
      </div>
      <div class="qr-section">
        <div class="qr-box">
          <div class="qr-label">Scan to see a live SafeEat demo menu</div>
          <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https%3A%2F%2Fsafeeat.co.uk%2Fmenu%2Fjoes-cafe-39vs&margin=4&format=png" alt="SafeEat demo menu QR code">
          <div class="qr-url">safeeat.co.uk/menu/joes-cafe-39vs</div>
        </div>
      </div>
    </div>
    <div class="footer">Allergen menu software for UK restaurants</div>
  </div>
  <script>
    var lastNumber = '';
    function sendSms(e) {
      e.preventDefault();
      var num = document.getElementById('phoneInput').value.replace(/\s/g, '');
      if (!num || num.length < 10) { alert('Enter a valid phone number'); return; }
      lastNumber = num;
      var msg = "Hi, it was great chatting! Here are my details: Mick from SafeEat - safeeat.co.uk/mick - See our demo menu: safeeat.co.uk/menu/joes-cafe-39vs";
      var ua = navigator.userAgent.toLowerCase();
      var sep = ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1 ? '&' : '?';
      window.location.href = 'sms:' + num + sep + 'body=' + encodeURIComponent(msg);
      setTimeout(function() {
        document.getElementById('saveContact').style.display = 'block';
      }, 500);
    }
    function saveToContacts() {
      if (!lastNumber) return;
      var vcf = 'BEGIN:VCARD\r\nVERSION:3.0\r\nTEL:' + lastNumber + '\r\nEND:VCARD';
      var blob = new Blob([vcf], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'contact.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
