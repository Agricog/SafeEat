<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Primary SEO -->
    <title>SafeEat — Allergen Menu Software for UK Restaurants | Natasha's Law Compliance</title>
    <meta name="description" content="SafeEat helps UK restaurants, cafés and takeaways manage the 14 regulated allergens with QR-code menus, real-time filtering, and a weekly verification audit trail. Stay compliant with Natasha's Law and the Food Information Regulations 2014." />
    <link rel="canonical" href="https://safeeat.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://safeeat.co.uk/" />
    <meta property="og:title" content="SafeEat — Allergen Menu Software for UK Restaurants" />
    <meta property="og:description" content="Manage the 14 UK allergens with QR-code menus, customer allergy profiles, and an EHO-ready audit trail. From £29.99/month." />
    <meta property="og:site_name" content="SafeEat" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SafeEat — Allergen Menu Software for UK Restaurants" />
    <meta name="twitter:description" content="Manage the 14 UK allergens with QR-code menus, customer allergy profiles, and an EHO-ready audit trail." />

    <!-- Geo targeting -->
    <meta name="geo.region" content="GB" />
    <meta name="geo.placename" content="United Kingdom" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SafeEat",
      "url": "https://safeeat.co.uk",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Allergen menu management software for UK restaurants. QR-code menus with real-time allergen filtering, customer allergy profiles, and weekly verification audit trail for EHO compliance.",
      "offers": {
        "@type": "Offer",
        "price": "29.99",
        "priceCurrency": "GBP",
        "priceValidUntil": "2027-12-31",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SafeEat",
      "url": "https://safeeat.co.uk",
      "description": "Allergen menu management software for UK restaurants and food businesses.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "GB"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
